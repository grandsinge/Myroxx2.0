<section class="devis">
<h3>Demande de devis</h3>
<form action="mailto:myroxx.0x@gmail.com?subject=Demande%20de%20devis%20site%20web" method="post" enctype="text/plain">

  <input type="tel" name="tel" placeholder="Téléphone" required>
  <select name="type" required>

    <option>Vitrine</option>
    <option>E-commerce</option>

  <input type="text" name="delai" placeholder="Délai souhaité" required>
  <textarea name="message" rows="5" placeholder="Informations supplémentaires"></textarea>
  <button type="submit">Envoyer le devis</button>
</form>

<button id="topBtn" onclick="topFunction()">↑</button>
<script>
const topBtn=document.getElementById("topBtn");
window.onscroll=()=>{topBtn.style.display=(document.body.scrollTop>300||document.documentElement.scrollTop>300)?"block":"none";};
function topFunction(){window.scrollTo({top:0,behavior:"smooth"});}
</script>
